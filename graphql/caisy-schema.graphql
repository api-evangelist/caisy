# ──────────────────────────────────────────────────────────────────────────────
# Root Query type
# ──────────────────────────────────────────────────────────────────────────────

"""
Root query type for the Caisy content API.

Single-document queries accept an `id: ID!` argument (except unique blueprints
such as Navigation and Footer which are project-level singletons).

Collection queries (`allX`) support cursor-based Relay pagination (`first`,
`last`, `after`, `before`), filtering via `where`, and multi-field sorting via
`sort`.
"""
type Query {
  # ── Single-document queries ──────────────────────────────────────────────

  """Fetch a single Asset by ID."""
  Asset(id: ID!, locale: String): Asset

  """Fetch a single Author by ID."""
  Author(id: ID!, locale: String): Author

  """Fetch a single BlogArticle by ID."""
  BlogArticle(id: ID!, locale: String): BlogArticle

  """Fetch a single BlogArticleGrid by ID."""
  BlogArticleGrid(id: ID!, locale: String): BlogArticleGrid

  """Fetch a single Category by ID."""
  Category(id: ID!, locale: String): Category

  """Fetch a single ContactForm by ID."""
  ContactForm(id: ID!, locale: String): ContactForm

  """Fetch a single Fulltext component by ID."""
  Fulltext(id: ID!, locale: String): Fulltext

  """Fetch a single FullwidthBlogTeaser by ID."""
  FullwidthBlogTeaser(id: ID!, locale: String): FullwidthBlogTeaser

  """Fetch a single Headline component by ID."""
  Headline(id: ID!, locale: String): Headline

  """Fetch a single NavigationEntry by ID."""
  NavigationEntry(id: ID!, locale: String): NavigationEntry

  """Fetch a single NewsletterSignup by ID."""
  NewsletterSignup(id: ID!, locale: String): NewsletterSignup

  """Fetch a single Page by ID."""
  Page(id: ID!, locale: String): Page

  """Fetch a single SeoInformation block by ID."""
  SeoInformation(id: ID!, locale: String): SeoInformation

  """Fetch a single TeaserGrid by ID."""
  TeaserGrid(id: ID!, locale: String): TeaserGrid

  """Fetch a single tag by ID."""
  Tag(id: ID!): Caisy_Field_Tag

  # ── Unique (singleton) blueprint queries — no ID required ──────────────

  """Fetch the project-level Footer singleton."""
  Footer(locale: String): Footer

  """Fetch the project-level Navigation singleton."""
  Navigation(locale: String): Navigation

  # ── Collection / paginated queries ──────────────────────────────────────

  """List and filter all Asset documents."""
