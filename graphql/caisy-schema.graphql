"""
Caisy GraphQL Schema
Endpoint: https://cloud.caisy.io/api/e/v4/{CAISY_PROJECT_ID}/graphql
Source: caisy-io/starter-template-next-simple-blog (graphql-code-generator introspection output)
Documentation: https://caisy.io/developer/docs/graphql-api

Caisy automatically generates queries for each blueprint defined in the project.
Each blueprint produces a single-record query (by ID) and a paginated collection
query (`allX`) following the Relay cursor connection spec.
"""

# ──────────────────────────────────────────────────────────────────────────────
# Scalars
# ──────────────────────────────────────────────────────────────────────────────

"""RFC 3339 quoted date-time string."""
scalar DateTime

"""Any JSON value (used for rich-text AST fields)."""
scalar JSON

# ──────────────────────────────────────────────────────────────────────────────
# Enums
# ──────────────────────────────────────────────────────────────────────────────

"""Sort direction for collection queries."""
enum Order {
  ASC
  DESC
}

# ──────────────────────────────────────────────────────────────────────────────
# System / shared types
# ──────────────────────────────────────────────────────────────────────────────

"""Document metadata injected automatically by Caisy on every content node."""
type CaisyDocument_Meta {
  createdAt: DateTime
  firstPublishedAt: DateTime
  id: ID
  locale: String
  locales: [String]
  publishedAt: DateTime
  updatedAt: DateTime
}

"""Relay-spec pagination information returned on every connection type."""
type PageInfo {
  endCursor: String
  hasNextPage: Boolean
  hasPreviousPage: Boolean
  startCursor: String
}

"""
Placeholder returned when a referenced document could not be found
(e.g. unpublished, deleted, or access-restricted).
"""
type Caisy_Field_Document_NotFound {
  id: ID
  message: String
}

"""Taxonomy tag attached to any document."""
type Caisy_Field_Tag {
  color: String
  id: String
  name: String
}

# ──────────────────────────────────────────────────────────────────────────────
# Filter input scalars
# ──────────────────────────────────────────────────────────────────────────────

"""String / text field filter operators."""
input CaisyField_String_Where {
  contains: String
  eq: String
  neq: String
}

"""Color field filter operators."""
input CaisyField_Color_Where {
  contains: String
  eq: String
  neq: String
}

"""Integer numeric field filter operators."""
input CaisyField_Number_WhereInt {
  eq: Int
  gt: Int
  gte: Int
  lt: Int
  lte: Int
  neq: Int
}

"""Rich-text field filter operators (operates on the serialised text content)."""
input CaisyField_Richtext_Where {
  contains: String
  eq: String
  neq: String
}

# ──────────────────────────────────────────────────────────────────────────────
# Asset (media / file)
# ──────────────────────────────────────────────────────────────────────────────

"""A media asset (image, video, or file) stored in Caisy."""
type Asset {
  _meta: CaisyDocument_Meta
  author: String
  blurHash: String
  copyright: String
  description: String
  dominantColor: String
  height: Int
  id: ID
  keywords: String
  originType: String
  originalName: String
  src: String
  title: String
  width: Int
}

type Asset_Connection {
  edges: [Asset_ConnectionEdge]
  pageInfo: PageInfo
  totalCount: Int
}

type Asset_ConnectionEdge {
  cursor: String
  node: Asset
}

input Asset_Nested_Where {
  AND: [Asset_Nested_Where]
  OR: [Asset_Nested_Where]
  author: CaisyField_String_Where
  blurHash: CaisyField_String_Where
  copyright: CaisyField_String_Where
  description: CaisyField_String_Where
  dominantColor: CaisyField_Color_Where
  height: CaisyField_Number_WhereInt
  keywords: CaisyField_String_Where
  originType: CaisyField_String_Where
  originalName: CaisyField_String_Where
  title: CaisyField_String_Where
  width: CaisyField_Number_WhereInt
}

input Asset_Sort {
  author: Order
  blurHash: Order
  copyright: Order
  createdAt: Order
  description: Order
  dominantColor: Order
  height: Order
  id: Order
  keywords: Order
  originType: Order
  originalName: Order
  publishedAt: Order
  title: Order
  updatedAt: Order
  width: Order
}

input Asset_Where {
  AND: [Asset_Where]
  OR: [Asset_Where]
  author: CaisyField_String_Where
  blurHash: CaisyField_String_Where
  copyright: CaisyField_String_Where
  description: CaisyField_String_Where
  dominantColor: CaisyField_Color_Where
  height: CaisyField_Number_WhereInt
  keywords: CaisyField_String_Where
  originType: CaisyField_String_Where
  originalName: CaisyField_String_Where
  title: CaisyField_String_Where
  width: CaisyField_Number_WhereInt
}

